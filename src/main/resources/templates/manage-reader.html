<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý Độc giả</title>
    <style>
        :root {
            --primary: #059669; /* A nice green for the library theme */
            --danger: #EF4444;
            --warning: #F59E0B;
            --bg: #F3F4F6;
            --surface: #FFFFFF;
            --text: #1F2937;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 2rem;
        }
        .container { max-width: 1000px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
        .card {
            background: var(--surface); padding: 1.5rem;
            border-radius: 8px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); margin-bottom: 2rem;
        }
        table { width: 100%; border-collapse: collapse; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #E5E7EB; }
        th { background-color: #F9FAFB; font-weight: 600; }

        button { padding: 8px 16px; border: none; border-radius: 4px; cursor: pointer; font-weight: 500; }
        button:hover { opacity: 0.8; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-danger { background: var(--danger); color: white; }
        .btn-warning { background: var(--warning); color: white; }
        .btn-secondary { background: #E5E7EB; color: #374151; }

        .form-group { margin-bottom: 1rem; }
        label { display: block; margin-bottom: 0.5rem; font-weight: 500; }
        input { width: 100%; padding: 8px; border: 1px solid #D1D5DB; border-radius: 4px; box-sizing: border-box; }

        /* Modal Styles */
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(0, 0, 0, 0.5); z-index: 1000;
            align-items: center; justify-content: center;
        }
        .modal-box {
            background: var(--surface); padding: 2rem; border-radius: 8px;
            max-width: 400px; width: 90%; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        }
        .modal-actions { display: flex; justify-content: flex-end; gap: 1rem; margin-top: 1.5rem; }

        .empty-msg { text-align: center; color: #6B7280; font-style: italic; padding: 2rem; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>Quản lý Độc giả</h2>
    </div>

    <div class="card">
        <h3>Thêm Độc giả Mới</h3>
        <form id="addReaderForm">
            <div style="display: flex; gap: 1rem;">
                <div class="form-group" style="flex: 1;">
                    <label>Họ và Tên</label>
                    <input type="text" id="addName" required>
                </div>
                <div class="form-group" style="flex: 1;">
                    <label>Email</label>
                    <input type="email" id="addEmail" required>
                </div>
                <div class="form-group" style="flex: 1;">
                    <label>Địa chỉ nhà</label>
                    <input type="text" id="addAddress" required>
                </div>
            </div>
            <button type="submit" class="btn-primary">Thêm</button>
        </form>
    </div>

    <div class="card">
        <div th:if="${msg}" class="empty-msg" th:text="${msg}"></div>

        <table th:if="${reader_list != null}">
            <thead>
            <tr>
                <th>ID</th>
                <th>Tên</th>
                <th>Email</th>
                <th>Địa chỉ nhà</th>
                <th>Hành động</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="reader : ${reader_list}">
                <td th:text="${reader.readerId}"></td>
                <td th:text="${reader.name}"></td>
                <td th:text="${reader.email}"></td>
                <td th:text="${reader.address}"></td>
                <td>
                    <button class="btn-warning" th:attr="onclick=|openEditModal(${reader.readerId})|">Sửa</button>
                    <button class="btn-danger" th:attr="onclick=|openDeleteModal(${reader.readerId})|">Xoá</button>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<div id="editModal" class="modal-overlay">
    <div class="modal-box">
        <h3>Sửa Thông tin Độc giả</h3>
        <form id="editReaderForm">
            <input type="hidden" id="editId">
            <div class="form-group">
                <label>Tên</label>
                <input type="text" id="editName" required>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="editEmail" required>
            </div>
            <div class="form-group">
                <label>Địa chỉ</label>
                <input type="text" id="editAddress" required>
            </div>
            <div class="modal-actions">
                <button type="button" class="btn-secondary" onclick="closeModal('editModal')">Hủy</button>
                <button type="submit" class="btn-primary">Lưu</button>
            </div>
        </form>
    </div>
</div>

<div id="deleteModal" class="modal-overlay">
    <div class="modal-box" style="text-align: center;">
        <h3 style="margin-top: 0;">Xác nhận Xoá</h3>
        <p>Bạn có chắc chắn muốn xoá độc giả này không?</p>
        <div class="modal-actions" style="justify-content: center;">
            <button class="btn-secondary" onclick="closeModal('deleteModal')">Hủy</button>
            <button class="btn-danger" onclick="executeDelete()">Xoá</button>
        </div>
    </div>
</div>

<script>
    const API_BASE = '/api/reader';
    let targetReaderId = null;

    // --- ADD READER ---
    document.getElementById('addReaderForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const payload = {
            name: document.getElementById('addName').value,
            email: document.getElementById('addEmail').value,
            address: document.getElementById('addAddress').value
        };

        fetch(`${API_BASE}/add_reader`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        })
        .then(response => {
            if (response.ok) {
                alert("Thêm độc giả thành công!");
                window.location.reload(); // Reload to let Thymeleaf redraw the table
            } else {
                response.text().then(text => alert("Lỗi: " + text));
            }
        });
    });

    // --- EDIT READER ---
    function openEditModal(id) {
        // Fetch current user data to populate the form
        fetch(`${API_BASE}/${id}`)
            .then(res => res.json())
            .then(reader => {
                document.getElementById('editId').value = reader.readerId;
                document.getElementById('editName').value = reader.name;
                document.getElementById('editEmail').value = reader.email;
                document.getElementById('editAddress').value = reader.address;
                document.getElementById('editModal').style.display = 'flex';
            });
    }

    document.getElementById('editReaderForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const payload = {
            readerId: document.getElementById('editId').value,
            name: document.getElementById('editName').value,
            email: document.getElementById('editEmail').value,
            address: document.getElementById('editAddress').value
        };

        fetch(`${API_BASE}/update_reader`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        })
        .then(response => {
            if (response.ok) {
                alert("Cập nhật thành công!");
                window.location.reload();
            }
        });
    });

    // --- DELETE READER ---
    function openDeleteModal(id) {
        targetReaderId = id;
        document.getElementById('deleteModal').style.display = 'flex';
    }

    function executeDelete() {
        if (!targetReaderId) return;

        fetch(`${API_BASE}/${targetReaderId}/delete`, { method: 'GET' })
        .then(response => {
            if (response.ok) {
                alert("Xoá người dùng thành công!");
                window.location.reload();
            } else {
                response.text().then(text => alert("Lỗi: " + text));
            }
        });
    }

    // --- UTILS ---
    function closeModal(modalId) {
        document.getElementById(modalId).style.display = 'none';
        targetReaderId = null;
    }
</script>

</body>
</html>
