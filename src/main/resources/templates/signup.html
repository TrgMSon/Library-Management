<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Library Manage</title>
    <link rel="stylesheet" th:href="@{/styleSignup.css}">
</head>
<body>

<div class="container">
    <h3>Bắt đầu với Library Manage</h3>

    <form method="post">

        <div class="form-group">
            <label for="username">Tên người dùng:</label>
            <input type="text" id="username" name="name" required>
        </div>

        <div class="form-group">
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>
        </div>

        <div class="form-group">
            <label for="password">Mật khẩu:</label>
            <input type="password" id="password" name="password" required>
        </div>

        <button type="submit" name="action" value="register">Đăng ký</button>
    </form>

    <div class="error-msg">
        <span th:text="${error}"></span>
    </div>

    <div class="login">
        Đã có tài khoản? <a th:href="@{/login}">Đăng nhập ngay</a>
    </div>

</div>

</body>
</html>
