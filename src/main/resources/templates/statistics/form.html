<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${type == 'books'} ? 'Thống kê sách' : 'Thống kê độc giả'">Thống kê</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <h1 th:text="${type == 'books'} ? 'Thống kê sách mượn nhiều' : 'Thống kê độc giả mượn nhiều'">Thống kê</h1>
        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
        <div class="card">
            <div class="card-body">
                <form th:action="@{${type == 'books'} ? '/statistics/books' : '/statistics/readers'}" method="post">
                    <div class="mb-3">
                        <label>Thời gian bắt đầu:</label>
                        <input type="datetime-local" name="startDate" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label>Thời gian kết thúc:</label>
                        <input type="datetime-local" name="endDate" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-primary">Xác nhận</button>
                    <a href="/statistics" class="btn btn-secondary">Quay lại</a>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
