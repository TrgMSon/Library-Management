<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Kết quả thống kê</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <h1 th:text="${type == 'books'} ? 'Sách mượn nhiều nhất' : 'Độc giả mượn nhiều nhất'">Kết quả</h1>
        <div class="alert alert-info">
            <span th:text="${#temporals.format(startDate, 'dd/MM/yyyy HH:mm')}"></span> - 
            <span th:text="${#temporals.format(endDate, 'dd/MM/yyyy HH:mm')}"></span>
        </div>
        
        <!-- Bảng sách -->
        <div th:if="${type == 'books'}">
            <table class="table table-striped">
                <thead>
                    <tr>
                        <th>STT</th>
                        <th>Tên sách</th>
                        <th>Tác giả</th>
                        <th>Số lần mượn</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="stat, iterStat : ${statistics}">
                        <td th:text="${iterStat.index + 1}"></td>
                        <td th:text="${stat.name}"></td>        <!-- SỬA Ở ĐÂY -->
                        <td th:text="${stat.author}"></td>
                        <td th:text="${stat.borrowCount}"></td>
                    </tr>
                </tbody>
            </table>
        </div>
        
        <!-- Bảng độc giả -->
        <div th:if="${type == 'readers'}">
            <table class="table table-striped">
                <thead>
                    <tr>
                        <th>STT</th>
                        <th>Tên độc giả</th>
                        <th>Email</th>
                        <th>Số lần mượn</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="stat, iterStat : ${statistics}">
                        <td th:text="${iterStat.index + 1}"></td>
                        <td th:text="${stat.name}"></td>
                        <td th:text="${stat.email}"></td>
                        <td th:text="${stat.borrowCount}"></td>
                    </tr>
                </tbody>
            </table>
        </div>
        
        <div th:if="${#lists.isEmpty(statistics)}" class="alert alert-warning">Không có dữ liệu!</div>
        
        <div class="mt-4">
            <a th:href="@{${type == 'books'} ? '/statistics/books' : '/statistics/readers'}" class="btn btn-primary">Thống kê lại</a>
            <a href="/statistics" class="btn btn-secondary">Quay lại</a>
        </div>
    </div>
</body>
</html>
